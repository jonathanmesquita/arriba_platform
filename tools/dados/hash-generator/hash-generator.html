<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Hash - Arriba Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../../assets/css/tokens.css" />
  <link rel="stylesheet" href="../../../assets/css/style.css" />
  <link rel="stylesheet" href="../../../assets/css/oracle-inspired.css" />
  <style>
    body{background:#f7f5f2;color:#161513}
    .tool-shell{width:min(980px,calc(100% - 40px));margin:48px auto}
    .tool-card{background:#fff;border:1px solid #ddd6cf;border-radius:10px;padding:28px;box-shadow:0 10px 28px rgba(0,0,0,.06)}
    .tool-brand{color:#c74634;font-weight:900;text-decoration:none;font-size:1.35rem}
    textarea{min-height:180px;font-family:Consolas,monospace}
    body.dark-mode{background:#101010;color:#fff}
    body.dark-mode .tool-card{background:#1e1e1e;border-color:#333}
  </style>
</head>
<body>
  <main class="tool-shell">
    <a class="tool-brand" href="../../index.html">ARRIBA</a>
    <section class="tool-card mt-4">
      
      <h1>Calculadora de Hash</h1>
      <p class="text-muted">Gere SHA-256 no navegador para textos simples.</p>
      <div class="mb-3">
        <label class="form-label fw-bold" for="hashInput">Texto</label>
        <textarea class="form-control" id="hashInput" placeholder="Digite o texto..."></textarea>
      </div>
      <button class="btn btn-dark" id="hashBtn">Gerar SHA-256</button>
      <hr>
      <pre id="hashOutput" style="white-space:pre-wrap;background:#101010;color:#eaeaea;padding:16px;border-radius:8px;">Aguardando...</pre>
    
    </section>
  </main>
  <script>
document.getElementById('hashBtn').onclick=async()=>{
  const txt=document.getElementById('hashInput').value;
  const data=new TextEncoder().encode(txt);
  const digest=await crypto.subtle.digest('SHA-256', data);
  const hash=[...new Uint8Array(digest)].map(b=>b.toString(16).padStart(2,'0')).join('');
  document.getElementById('hashOutput').textContent=hash;
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor CSV para JSON - Arriba Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../../assets/css/tokens.css" />
  <link rel="stylesheet" href="../../../assets/css/style.css" />
  <link rel="stylesheet" href="../../../assets/css/oracle-inspired.css" />
  <style>
    body{background:#f7f5f2;color:#161513}
    .tool-shell{width:min(980px,calc(100% - 40px));margin:48px auto}
    .tool-card{background:#fff;border:1px solid #ddd6cf;border-radius:10px;padding:28px;box-shadow:0 10px 28px rgba(0,0,0,.06)}
    .tool-brand{color:#c74634;font-weight:900;text-decoration:none;font-size:1.35rem}
    textarea{min-height:180px;font-family:Consolas,monospace}
    body.dark-mode{background:#101010;color:#fff}
    body.dark-mode .tool-card{background:#1e1e1e;border-color:#333}
  </style>
</head>
<body>
  <main class="tool-shell">
    <a class="tool-brand" href="../../index.html">ARRIBA</a>
    <section class="tool-card mt-4">
      
      <h1>Conversor CSV para JSON</h1>
      <p class="text-muted">Cole um CSV separado por ponto e vírgula ou vírgula. A primeira linha será usada como cabeçalho.</p>
      <div class="mb-3">
        <label class="form-label fw-bold" for="csvInput">CSV</label>
        <textarea class="form-control" id="csvInput" placeholder="nome;email\nJoão;joao@email.com"></textarea>
      </div>
      <button class="btn btn-dark" id="convertBtn">Converter</button>
      <button class="btn btn-outline-dark ms-2" id="downloadBtn">Baixar JSON</button>
      <hr>
      <pre id="jsonOutput" style="white-space:pre-wrap;background:#101010;color:#eaeaea;padding:16px;border-radius:8px;">[]</pre>
    
    </section>
  </main>
  <script>
const input=document.getElementById('csvInput'), output=document.getElementById('jsonOutput');
function parseCsv(text){
  const lines=text.trim().split(/\r?\n/).filter(Boolean);
  if(!lines.length) return [];
  const sep=lines[0].includes(';')?';':',';
  const headers=lines[0].split(sep).map(h=>h.trim());
  return lines.slice(1).map(line=>{
    const values=line.split(sep);
    return Object.fromEntries(headers.map((h,i)=>[h,(values[i]||'').trim()]));
  });
}
document.getElementById('convertBtn').onclick=()=>{output.textContent=JSON.stringify(parseCsv(input.value),null,2)};
document.getElementById('downloadBtn').onclick=()=>{
  const blob=new Blob([output.textContent],{type:'application/json;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='csv-convertido.json'; a.click();
  URL.revokeObjectURL(a.href);
};
</script>
</body>
</html>
